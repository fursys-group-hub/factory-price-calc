<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공장판매가 산출 표준서식</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','맑은 고딕',sans-serif;font-size:14px;background:#f7f7f5;color:#1a1a1a;min-height:100vh}

/* ── 헤더 ── */
.app-header{background:#fff;border-bottom:1px solid #e5e5e0;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.app-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.app-title svg{color:#1D9E75}
.app-ver{font-size:11px;color:#bbb;font-weight:400}
.gear-btn{width:34px;height:34px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;flex-shrink:0;transition:all .12s}
.gear-btn:hover,.gear-btn.open{background:#f0f0f0;color:#333;border-color:#ccc}

/* ── 설정 패널 ── */
.settings-panel{background:#fff;border-bottom:1px solid #e5e5e0;padding:20px 24px;display:none}
.settings-panel.open{display:block}

/* 최상위 탭: 브랜드설정 / 문서서식 */
.s-top-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #f0f0f0}
.s-top-tab{font-size:13px;font-weight:500;padding:8px 18px;cursor:pointer;color:#aaa;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s}
.s-top-tab:hover{color:#555}
.s-top-tab.st-act{color:#1a1a1a;border-bottom-color:#1a1a1a}

/* 브랜드 서브탭 */
.s-brand-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #f0f0f0}
.s-brand-tab{font-size:12px;padding:5px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#888;cursor:pointer;font-weight:500;transition:all .12s}
.s-brand-tab:hover{border-color:#bbb;color:#555}
.s-brand-tab.s-act{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.add-brand-btn{font-size:12px;padding:5px 12px;border:1px dashed #ccc;border-radius:8px;background:#fff;color:#aaa;cursor:pointer}
.add-brand-btn:hover{border-color:#1D9E75;color:#1D9E75}

/* 공통 폼 */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.sgrid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.ss{margin-bottom:18px}.ss:last-child{margin-bottom:0}
.ss-title{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #f5f5f5}
.sf{display:flex;flex-direction:column;gap:4px}
.sf label{font-size:12px;color:#888;font-weight:500}
.sf input[type=text],.sf input[type=number],.sf textarea{font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;width:100%;font-family:inherit}
.sf textarea{resize:vertical;min-height:60px;line-height:1.5}
.sf input:focus,.sf textarea:focus{border-color:#1D9E75}
.sf .hint{font-size:11px;color:#bbb;margin-top:3px}

.color-picker{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s;flex-shrink:0}
.color-dot:hover{transform:scale(1.15)}
.color-dot.c-act{transform:scale(1.1)}
.fee-row{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.fee-ni{flex:1;font-size:12px;padding:5px 9px;border:1px solid #ddd;border-radius:6px;outline:none;min-width:0}
.fee-ni:focus{border-color:#1D9E75}
.fee-ri{width:70px;font-size:12px;padding:5px 9px;border:1px solid #ddd;border-radius:6px;outline:none;text-align:right}
.fee-ri:focus{border-color:#1D9E75}
.fee-unit{font-size:12px;color:#aaa;white-space:nowrap}
.fee-del{font-size:11px;padding:4px 8px;border:1px solid #fcc;border-radius:6px;background:#fff;color:#e24b4a;cursor:pointer}
.fee-del:hover{background:#fcebeb}
.add-fee-btn{font-size:12px;padding:5px 12px;border:1px dashed #ddd;border-radius:6px;background:#fff;color:#aaa;cursor:pointer;display:inline-block;margin-top:2px}
.add-fee-btn:hover{border-color:#1D9E75;color:#1D9E75}
.del-brand-btn{font-size:12px;padding:6px 14px;border:1px solid #fcc;border-radius:8px;background:#fff;color:#e24b4a;cursor:pointer;margin-top:14px;display:inline-block}
.del-brand-btn:hover{background:#fcebeb}

.s-footer{display:flex;align-items:center;gap:10px;margin-top:20px;padding-top:14px;border-top:1px solid #f0f0f0}
.save-btn{font-size:13px;padding:7px 18px;border-radius:8px;cursor:pointer;border:1px solid #1D9E75;background:#1D9E75;color:#fff;font-weight:500}
.save-btn:hover{background:#0F6E56}
.reset-btn2{font-size:12px;padding:7px 14px;border-radius:8px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#999}
.reset-btn2:hover{color:#555;border-color:#bbb}
.save-toast{font-size:12px;color:#1D9E75;font-weight:500;opacity:0;transition:opacity .3s}
.save-toast.show{opacity:1}

/* ── 본문 ── */
.container{max-width:1100px;margin:0 auto;padding:20px 24px 48px}
.topbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.doc-field{display:flex;align-items:center;gap:6px;flex:1;min-width:200px}
.doc-field label{font-size:12px;color:#888;white-space:nowrap;font-weight:500}
.doc-field input{flex:1;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.doc-field input:focus{border-color:#1D9E75}
.brand-tabs-wrap{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;background:#fff}
.brand-tab{font-size:12px;padding:7px 18px;background:#fff;color:#888;cursor:pointer;border:none;border-right:1px solid #eee;font-weight:500;transition:all .12s}
.brand-tab:last-child{border-right:none}
.brand-tab:hover{background:#fafafa;color:#555}
.brand-tab.b-act{font-weight:600}

/* ── 문서 헤더 ── */
.doc-header{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:18px 20px;margin-bottom:16px;font-size:13px;line-height:1.9}
.dh-num{font-weight:600}.dh-item{padding-left:.8rem;color:#666}
.dh-sub{padding-left:1.4rem;font-size:12px;color:#777}
.dh-bracket{padding-left:.9rem;font-size:12px;color:#aaa;font-style:italic}
.dh-divider{border:none;border-top:1px solid #f0f0f0;margin:8px 0}

/* ── 붙여넣기 ── */
.paste-zone{border:2px dashed #5DCAA5;border-radius:12px;overflow:hidden;background:#E1F5EE;transition:all .15s}
.paste-zone.dragging{background:#c8eddc;border-color:#085041}
.paste-zone.has-data{background:#fff;border-color:#ddd;border-style:solid}
.paste-inner{display:flex;align-items:flex-start;gap:12px;padding:16px 18px}
.paste-icon{flex-shrink:0;margin-top:3px;color:#1D9E75;opacity:.8}
.paste-zone.has-data .paste-icon{color:#ccc}
.paste-ta{flex:1;min-height:68px;background:transparent;border:none;outline:none;color:#085041;font-size:13px;font-family:inherit;resize:none;line-height:1.7}
.paste-ta::placeholder{color:#5DCAA5;line-height:1.9;font-size:13px}
.paste-zone.has-data .paste-ta{min-height:24px;color:#888;font-size:12px}
.err-msg{font-size:12px;color:#e24b4a;margin-top:6px}

/* ── 테이블 ── */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e5e5e0;margin-top:16px;background:#fff}
table{border-collapse:collapse;width:100%;font-size:12px}
th{font-size:11px;font-weight:600;color:#888;padding:7px 10px;border:1px solid #e5e5e0;text-align:center;white-space:nowrap;background:#fafaf8}
td{padding:7px 10px;border:1px solid #e5e5e0;color:#1a1a1a;font-size:12px;white-space:nowrap;text-align:center}
tbody tr:hover td{background:#fafaf8}
.hl-c{background:#E1F5EE;color:#085041;font-weight:600}
.hl-o{background:#FAEEDA;color:#412402;font-weight:600}
.dash{color:#ccc}
.tog{display:inline-flex;border:1px solid #ddd;border-radius:20px;overflow:hidden;font-size:11px}
.tog span{padding:3px 10px;cursor:pointer;color:#aaa;user-select:none}
.tog span.on-s{background:#E1F5EE;color:#085041;font-weight:600}
.tog span.on-o{background:#FAEEDA;color:#633806;font-weight:600}
.actions{margin-top:16px;display:flex;gap:10px;align-items:center}
.btn{font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#333;font-weight:500}
.btn:hover{background:#f5f5f5}
.btn-p{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-p:hover{background:#0F6E56}
.btn-g{background:none;border-color:transparent;color:#999;font-size:12px}
.btn-g:hover{color:#333}

@media(max-width:700px){
  .container{padding:12px 12px 32px}
  .settings-panel{padding:16px}
  .topbar{flex-direction:column;align-items:stretch}
  .brand-tabs-wrap{align-self:flex-start}
  td,th{padding:5px 6px;font-size:11px}
}

/* ── 확인 모달 ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-ttl{font-size:15px;font-weight:600}
.modal-x{width:28px;height:28px;border:none;background:none;cursor:pointer;color:#aaa;font-size:18px;display:flex;align-items:center;justify-content:center;border-radius:6px;line-height:1}
.modal-x:hover{background:#f5f5f5;color:#555}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-sec{margin-bottom:16px}.modal-sec:last-child{margin-bottom:0}
.modal-sec-ttl{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.modal-sec-ttl::after{content:'';flex:1;height:1px;background:#f0f0f0}
.brand-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600}
.brand-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rate-tbl{width:100%;border-collapse:collapse;font-size:12px}
.rate-tbl td{padding:6px 8px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.rate-tbl td:first-child{color:#666}
.rate-tbl td:last-child{font-weight:600;text-align:right;color:#1a1a1a}
.rate-tbl tr:last-child td{border-bottom:none}
.rate-sep td{padding:3px 8px;border-bottom:1px solid #e5e5e0;font-size:10px;color:#ccc;font-weight:400;text-transform:uppercase;letter-spacing:.05em}
.item-tbl{width:100%;border-collapse:collapse;font-size:12px}
.item-tbl th{font-size:11px;font-weight:600;color:#888;padding:6px 8px;background:#fafaf8;border-bottom:1px solid #e5e5e0;text-align:left}
.item-tbl td{padding:7px 8px;border-bottom:1px solid #f5f5f5;font-size:12px}
.item-tbl tr:last-child td{border-bottom:none}
.item-tbl .tc{text-align:center}
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:10px;font-weight:600}
.tag-s{background:#E1F5EE;color:#085041}
.tag-o{background:#FAEEDA;color:#633806}
.modal-ftr{padding:14px 22px 18px;border-top:1px solid #f0f0f0;display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}
.m-cancel{font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;font-weight:500}
.m-cancel:hover{background:#f5f5f5}
.m-confirm{font-size:13px;padding:8px 22px;border-radius:8px;cursor:pointer;border:1px solid #1D9E75;background:#1D9E75;color:#fff;font-weight:600}
.m-confirm:hover{background:#0F6E56}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    공장판매가 산출 표준서식
    <span class="app-ver">v3.0</span>
  </div>
  <button class="gear-btn" id="gearBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<div class="settings-panel" id="settingsPanel">
  <div class="s-top-tabs">
    <button class="s-top-tab st-act" data-tp="brand">브랜드 설정</button>
    <button class="s-top-tab" data-tp="tmpl">문서 서식</button>
  </div>
  <div id="sContent"></div>
  <div class="s-footer">
    <button class="save-btn" id="saveBtn">설정 저장</button>
    <button class="reset-btn2" id="resetDefBtn">기본값으로 초기화</button>
    <span class="save-toast" id="saveToast">✓ 저장되었습니다</span>
  </div>
</div>

<div class="container">
  <div class="topbar">
    <div class="doc-field"><label>문서번호</label><input id="docNum" value="R202604-00020"></div>
    <div class="brand-tabs-wrap" id="brandTabs"></div>
  </div>
  <div class="doc-header" id="docHeader"></div>
  <div class="paste-zone" id="pasteZone"><div class="paste-inner">
    <svg class="paste-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
      <rect x="8" y="2" width="8" height="4" rx="1"/>
      <line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
    </svg>
    <textarea id="pasteArea" class="paste-ta" placeholder="ERP 문서 또는 엑셀에서 표를 복사 후 Ctrl+V&#10;&#10;ERP 제품 제조원가 결과내역 → 표 범위 드래그 → 복사 → 여기 붙여넣기&#10;엑셀 복사도 동일하게 지원됩니다"></textarea>
  </div></div>
  <div class="err-msg" id="errMsg" style="display:none"></div>
  <div id="tableArea"></div>
</div>


<!-- 확인 모달 -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-ttl">다운로드 전 확인</span>
      <button class="modal-x" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-ftr">
      <button class="m-cancel" id="modalCancel">취소</button>
      <button class="m-confirm" id="modalConfirm">확인 후 다운로드</button>
    </div>
  </div>
</div>

<script>
/* ── 유틸 ── */
const ceil100=n=>Math.ceil(n/100)*100,rnd=n=>Math.round(n),fmt=n=>n.toLocaleString('ko-KR');
const pn=s=>{const n=parseFloat((s||'').replace(/,/g,'').replace(/\s/g,''));return isNaN(n)?0:n;};
const uid=()=>'id'+Date.now()+Math.random().toString(36).slice(2,5);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ── 팔레트 ── */
const PAL=[
  {bg:'#E1F5EE',tx:'#085041',thB:'#E1F5EE',thC:'#0F6E56',hg:'background:#e8f5ef;color:#084d35'},
  {bg:'#E6F1FB',tx:'#042C53',thB:'#E6F1FB',thC:'#185FA5',hg:'background:#e8f2fb;color:#042C53'},
  {bg:'#FAEEDA',tx:'#412402',thB:'#FAEEDA',thC:'#854F0B',hg:'background:#fef2d8;color:#412402'},
  {bg:'#EEEDFE',tx:'#26215C',thB:'#EEEDFE',thC:'#534AB7',hg:'background:#eeedfe;color:#3C3489'},
  {bg:'#EAF3DE',tx:'#173404',thB:'#EAF3DE',thC:'#3B6D11',hg:'background:#eaf3de;color:#3B6D11'},
];

/* ── 기본 브랜드 ── */
const DEF_BRANDS=[
  {id:'sidiz',name:'시디즈',color:0,mfg:1.485,margin:5.3,order:5.0,fees:[]},
  {id:'assoc',name:'관계사',color:1,mfg:1.485,margin:5.3,order:5.0,fees:[
    {id:'f1',name:'기획/개발 수수료',rate:2.2},{id:'f2',name:'재고보관료',rate:1.0}
  ]},
  {id:'cha4300',name:'CHA4300',color:2,mfg:1.485,margin:5.3,order:5.0,fees:[
    {id:'f1',name:'기획/개발 수수료',rate:2.2},{id:'f2',name:'재고보관료',rate:1.0},{id:'f3',name:'교차판매 수수료',rate:1.0}
  ]}
];

/* ── 기본 문서 서식 ── */
const DEF_TMPL={
  s1_title:'1. 개요',
  s1_brand:'{brand} 공장판매가 산출 표준 서식',
  s1_docnum:'기준 문서번호:',
  s2_title:'2. 공장판매가 산출 기준',
  s2_formula:'공장판매가 = 재료비 + 노무비 + 일반관리비 합계 + 개발비',
  s2_items_label:'[항목 정의]',
  s2_amount_rule:'금액 처리 기준 : 공장판매가 100원 단위 올림',
  s3_title:'3. 공장판매가 표준서식',
  s3_unit:'[단위: 원, 공급가액 기준]',
};

const SK_B='factory_brands_v2';
const SK_T='factory_tmpl_v1';

let brands=[],tmpl={},actId='',sId='',sTopTab='brand',rows=[];

/* ── 로드/저장 ── */
function load(){
  try{const s=JSON.parse(localStorage.getItem(SK_B));brands=s&&s.length>0?s:JSON.parse(JSON.stringify(DEF_BRANDS));}
  catch(e){brands=JSON.parse(JSON.stringify(DEF_BRANDS));}
  try{const t=JSON.parse(localStorage.getItem(SK_T));tmpl=t?{...DEF_TMPL,...t}:{...DEF_TMPL};}
  catch(e){tmpl={...DEF_TMPL};}
  actId=brands[0].id;sId=brands[0].id;
}
function saveAll(){
  try{
    localStorage.setItem(SK_B,JSON.stringify(brands));
    localStorage.setItem(SK_T,JSON.stringify(tmpl));
    const t=document.getElementById('saveToast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
  }catch(e){}
}
function resetDef(){

/* ── 계산 ── */
function calc(r,brand){
  const mc=rnd(r.labor*brand.mfg),b3=r.material+r.labor+mc;
  const fm=rnd(b3*brand.margin/100);
  const feeAmts=brand.fees.map(f=>({...f,amt:rnd(b3*f.rate/100)}));
  const mt=mc+fm+feeAmts.reduce((s,f)=>s+f.amt,0);
  const cp=ceil100(r.material+r.labor+mt);
  const op=r.isOrder?ceil100(cp*(1+brand.order/100)):null;
  return{mc,fm,feeAmts,mt,cp,op};
}

/* ── 파싱 ── */
function parseTxt(text){
  const lines=text.trim().split(/\r?\n/).map(l=>l.split('\t').map(c=>c.trim()));
  let hi=-1,cm={};
  for(let i=0;i<Math.min(lines.length,6);i++){
    const j=lines[i].join('');
    if(j.includes('단품코드')||j.includes('자재비합계')||j.includes('자재비')){
      hi=i;lines[i].forEach((c,k)=>{
        if(c.includes('단품코드'))cm.code=k;else if(c==='색상'||c.startsWith('색상'))cm.color=k;
        else if(c.includes('단품명'))cm.name=k;else if(c.includes('자재비'))cm.mat=k;else if(c.includes('가공비'))cm.lab=k;
      });break;
    }
  }
  const si=hi>=0?hi+1:0,res=[];
  for(let i=si;i<lines.length;i++){
    const row=lines[i];if(row.length<3)continue;
    const g=k=>{const x=cm[k];return(x!==undefined&&x<row.length)?row[x]||'':'';};
    let mat,lab,code,color,name;
    if(Object.keys(cm).length>=3){mat=pn(g('mat'));lab=pn(g('lab'));code=g('code');color=g('color');name=g('name');}
    else{code=row[1]||'';color=row[2]||'';name=row[3]||'';mat=pn(row[4]);lab=pn(row[5]);}
    if(!mat&&!lab)continue;if(!code&&!name)continue;
    res.push({code,color,name,material:mat,labor:lab,isOrder:false});
  }
  return res;
}
function parseHTM(html){
  const div=document.createElement('div');div.innerHTML=html;
  const tables=div.querySelectorAll('table');if(!tables.length)return null;
  let best=tables[0],mx=0;
  tables.forEach(t=>{const rc=t.querySelectorAll('tr').length;if(rc>mx){mx=rc;best=t;}});
  const trs=best.querySelectorAll('tr');if(trs.length<2)return null;
  const grid=[];
  trs.forEach(tr=>{
    const cells=[];
    tr.querySelectorAll('th,td').forEach(td=>{
      const tx=td.textContent.replace(/\s+/g,' ').trim();
      const cs=parseInt(td.getAttribute('colspan'))||1;
      for(let c=0;c<cs;c++)cells.push(c===0?tx:'');
    });
    if(cells.length>0)grid.push(cells);
  });
  let hi=-1,cm={};
  for(let i=0;i<Math.min(grid.length,6);i++){
    const j=grid[i].join('');
    if(j.includes('단품코드')||j.includes('자재비')){
      hi=i;grid[i].forEach((c,k)=>{
        if(c.includes('단품코드'))cm.code=k;else if(c.includes('색상'))cm.color=k;
        else if(c.includes('단품명'))cm.name=k;else if(c.includes('자재비'))cm.mat=k;else if(c.includes('가공비'))cm.lab=k;
      });break;
    }
  }
  const si=hi>=0?hi+1:0,res=[];
  for(let i=si;i<grid.length;i++){
    const row=grid[i];if(row.length<3)continue;
    const g=k=>{const x=cm[k];return(x!==undefined&&x<row.length)?row[x]||'':'';};
    let mat,lab,code,color,name;
    if(Object.keys(cm).length>=3){mat=pn(g('mat'));lab=pn(g('lab'));code=g('code');color=g('color');name=g('name');}
    else{code=row[1]||'';color=row[2]||'';name=row[3]||'';mat=pn(row[4]);lab=pn(row[5]);}
    if(!mat&&!lab)continue;if(!code&&!name)continue;
    res.push({code:code.trim(),color:color.trim(),name:name.trim(),material:mat,labor:lab,isOrder:false});
  }
  return res.length>0?res:null;
}

document.addEventListener('paste',function(e){
  if(document.activeElement!==document.getElementById('pasteArea'))return;
  e.preventDefault();
  const html=e.clipboardData.getData('text/html');
  if(html){const r=parseHTM(html);if(r&&r.length>0){showResult(r,'html');return;}}
  const text=e.clipboardData.getData('text/plain');
  if(text){const r=parseTxt(text);if(r&&r.length>0){showResult(r,'text');return;}}

});

  const oth=ho?`<th rowspan="2">공장판매가(주문품=표준품×${brand.order}%)</th>`:'';
  const trs=rows.map(r=>{
    const c=calc(r,brand);
    const fTds=c.feeAmts.map(f=>`<td>${fmt(f.amt)}</td>`).join('');
    const st=hs?(r.isOrder?`<td style="color:#aaa">-</td>`:`<td class="hl">${fmt(c.cp)}</td>`):'';
    const ot=ho?(r.isOrder?`<td class="hl2">${c.op?fmt(c.op):'-'}</td>`:`<td style="color:#aaa">-</td>`):'';
    return `<tr><td>${esc(r.code)}</td><td>${esc(r.color)}</td><td>${esc(r.name)}</td><td>${fmt(r.material)}</td><td>${fmt(r.labor)}</td><td>${fmt(c.mc)}</td><td>${fmt(c.fm)}</td>${fTds}<td>${fmt(c.mt)}</td>${st}${ot}<td>${r.isOrder?'주문품':'표준품'}</td></tr>`;
  }).join('');
  const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<title>공장판매가 산출 — ${esc(brand.name)}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'맑은 고딕','Apple SD Gothic Neo',sans-serif;font-size:10pt;color:#111}b{font-size:10pt}.bracket{font-size:9pt;color:#666;font-style:italic}table{border-collapse:collapse;width:100%;margin-top:6px}th,td{border:.5pt solid #999;padding:4px 5pt;text-align:center;font-size:8.5pt;white-space:nowrap}th{font-weight:bold;background:#f4f4f4}.grp{${p.hg}}.hl{background:#e8f5ef;font-weight:bold}.hl2{background:#fef2d8;font-weight:bold}</style></head><body>
<b>${esc(tmpl.s1_title)}</b><br>
- <strong>${esc(brandLine)}</strong><br>
- ${esc(tmpl.s1_docnum)} ${esc(d)} &nbsp; 작성일: ${now}<br><br>
<b>${esc(tmpl.s2_title)}</b><br>
- ${esc(tmpl.s2_formula)}<br>
<span class="bracket">${esc(tmpl.s2_items_label)}</span><br>
${items.map((t,i)=>`${i+1}) ${esc(t)}<br>`).join('')}
- ${esc(tmpl.s2_amount_rule)}<br><br>
<b>${esc(tmpl.s3_title)}</b> <span style="font-size:8.5pt;color:#555">${esc(tmpl.s3_unit)}</span>
<table><thead><tr>
<th rowspan="2">단품코드</th><th rowspan="2">색상</th><th rowspan="2">단품명칭</th>
<th rowspan="2">재료비</th><th rowspan="2">노무비</th>
<th colspan="${gs}" class="grp">일반관리비</th>
${sth}${oth}<th rowspan="2">구분</th>
</tr><tr><th class="grp">제조경비</th><th class="grp">공장마진</th>${fHdrs}<th class="grp">합계</th></tr></thead>
<tbody>${trs}</tbody></table></body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`공장판매가산출_${brand.name}_${d}.html`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}


/* ── 확인 모달 ── */
function showConfirmModal(){
  if(!rows.length) return;
  const brand=actBrand(),p=pl(brand);

  // 산출 기준 행 구성
  const rateRows=[
    ['제조경비 배부율', `× ${brand.mfg}`],
    ['공장마진율', `${brand.margin}%`],
  ];
  brand.fees.forEach(f=>rateRows.push([f.name, `${f.rate}%`]));
  if(rows.some(r=>r.isOrder)) rateRows.push(['주문품 추가요율', `${brand.order}%`]);

  const rateHtml=rateRows.map(([label,val])=>`
    <tr><td>${esc(label)}</td><td>${esc(val)}</td></tr>`).join('');

  // 품목 목록
  const itemHtml=rows.map(r=>`
    <tr>
      <td style="font-size:11px;color:#888">${esc(r.code)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.name)}</td>
      <td class="tc"><span class="tag ${r.isOrder?'tag-o':'tag-s'}">${r.isOrder?'주문품':'표준품'}</span></td>
    </tr>`).join('');

  document.getElementById('modalBody').innerHTML=`
    <div class="modal-sec">
      <div class="modal-sec-ttl">브랜드</div>
      <span class="brand-badge" style="background:${p.bg};color:${p.tx}">
        <span class="brand-dot" style="background:${p.tx}"></span>
        ${esc(brand.name)}
      </span>
    </div>
    <div class="modal-sec">
      <div class="modal-sec-ttl">산출 기준 요율</div>
      <table class="rate-tbl">${rateHtml}</table>
    </div>
    <div class="modal-sec">
      <div class="modal-sec-ttl">품목별 구분 (${rows.length}개)</div>
      <table class="item-tbl">
        <thead><tr><th>단품코드</th><th>단품명</th><th class="tc">구분</th></tr></thead>
        <tbody>${itemHtml}</tbody>
      </table>
    </div>`;

  document.getElementById('confirmModal').classList.remove('hidden');
}
function closeModal(){document.getElementById('confirmModal').classList.add('hidden');}
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalCancel').addEventListener('click',closeModal);
document.getElementById('modalConfirm').addEventListener('click',()=>{closeModal();dlHTML();});
document.getElementById('confirmModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

/* ── 초기 실행 ── */
load();renderBTabs();renderDocH();
</script>
